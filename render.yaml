services:
  - type: web
    name: job-assistant
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: JOB_ASSISTANT_HOST
        value: 0.0.0.0
      - key: JOB_ASSISTANT_DATA_DIR
        value: /tmp/job-assistant/app-data
      - key: JOB_ASSISTANT_WORKSPACE_DIR
        value: /tmp/job-assistant/workspace
      - key: JOB_ASSISTANT_REQUIRE_AUTH
        value: "1"
      - key: SUPABASE_STORAGE_BUCKET
        value: job-assistant-users
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
